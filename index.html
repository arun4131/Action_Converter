<!DOCTYPE html>
<html>
<head>
  <title>Action Converter</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gradient-to-br from-blue-100 to-purple-100 flex items-center justify-center h-screen">

  <div class="bg-white p-8 rounded-3xl shadow-xl w-[420px] transition-all">

    <h1 class="text-3xl font-bold text-center mb-2">
      🚀 Action Converter
    </h1>

    <p class="text-sm text-gray-500 text-center mb-6">
      Turn your curiosity into action
    </p>

    <input 
      id="input"
      type="text"
      placeholder="What do you want to learn?"
      class="w-full p-3 border rounded-xl mb-3 focus:outline-none focus:ring-2 focus:ring-blue-400"
    />

    <input 
      id="time"
      type="number"
      placeholder="Hours per day (e.g. 2)"
      class="w-full p-3 border rounded-xl mb-4 focus:outline-none focus:ring-2 focus:ring-purple-400"
    />

    <button 
      onclick="generatePlan()"
      class="w-full bg-gradient-to-r from-blue-500 to-purple-500 text-white p-3 rounded-xl font-semibold hover:scale-105 transition"
    >
      Generate Plan
    </button>

    <div 
      id="result" 
      class="mt-5 text-sm whitespace-pre-wrap bg-gray-50 p-4 rounded-xl min-h-[80px]"
    ></div>

  </div>

<script>
async function generatePlan() {
  const input = document.getElementById("input").value;
  const time = document.getElementById("time").value;

  if (!input || !time) {
    alert("Please fill both fields!");
    return;
  }

  document.getElementById("result").innerText = "⏳ Generating your plan...";

  try {
    const res = await fetch("http://127.0.0.1:5000/generate-plan", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ input, time })
    });

    const data = await res.json();
    document.getElementById("result").innerText = data.plan;
  } catch (err) {
    document.getElementById("result").innerText = "❌ Error generating plan";
  }
}
</script>

</body>
</html>
